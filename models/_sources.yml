version: 2

sources:
  - name: bronze
    database: HEALTHCARE_DB
    schema: RAW
    description: "Raw layer - data validated and loaded by the gatekeeper (single ingestion path)"

    tables:
      - name: patient_admissions
        description: "One row per hospital admission (validated + loaded by the gatekeeper)"
      - name: treatment_records
        description: "One row per treatment"
      - name: insurance_claims
        description: "One row per insurance claim"
      - name: seed_doctors
      - name: seed_hospitals
      - name: seed_insurers